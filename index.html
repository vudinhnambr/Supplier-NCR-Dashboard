<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Supplier NCR Dashboard</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            NCR
        </div>

        <div class="sub-logo">
            Supplier Performance Dashboard
        </div>

        <div class="filter-section">

            <label>Supplier</label>

            <select id="supplierFilter">
                <option value="">All Suppliers</option>
            </select>

        </div>

        <div class="filter-section">

            <label>Year</label>

            <select id="yearFilter">
                <option value="">All Years</option>
            </select>

        </div>

        <button
            class="reset-btn"
            onclick="location.reload()">
            Reset
        </button>

    </aside>

    <main class="main">

        <div class="header">

            <div>

                <h1>
                    SUPPLIER PERFORMANCE
                </h1>

                <span>
                    NCR Analytics Dashboard
                </span>

            </div>

            <div class="header-info">

                <div class="info-card">
                    Live NCR Data
                </div>

                <div class="info-card">
                    Google Sheet Connected
                </div>

            </div>

        </div>

        <section class="kpi-grid">

            <div class="kpi-card">
                <h4>Total NCR</h4>
                <span id="totalNcr">0</span>
            </div>

            <div class="kpi-card">
                <h4>Total Qty</h4>
                <span id="totalQty">0</span>
            </div>

            <div class="kpi-card">
                <h4>Suppliers</h4>
                <span id="totalSupplier">0</span>
            </div>

            <div class="kpi-card">
                <h4>Parts</h4>
                <span id="totalPart">0</span>
            </div>

            <div class="kpi-card">
                <h4>Open NCR</h4>
                <span id="openNcr">0</span>
            </div>

        </section>

        <section class="charts">

            <div class="chart-card full">
                <h3>Supplier NCR Ranking</h3>
                <canvas id="supplierChart"></canvas>
            </div>

            <div class="chart-card">
                <h3>NCR by Year</h3>
                <canvas id="yearChart"></canvas>
            </div>

            <div class="chart-card">
                <h3>NCR by Month</h3>
                <canvas id="monthChart"></canvas>
            </div>

            <div class="chart-card">
                <h3>Top Parts</h3>
                <canvas id="partChart"></canvas>
            </div>

            <div class="chart-card">
                <h3>Phenomenon</h3>
                <canvas id="phenomenonChart"></canvas>
            </div>

            <div class="chart-card full">
                <h3>Replacement Status</h3>
                <canvas id="statusChart"></canvas>
            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
