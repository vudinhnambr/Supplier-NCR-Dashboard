<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Supplier NCR Dashboard</title>

<link rel="stylesheet"
href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script defer
src="app.js"></script>

</head>

<body>

<header>

<h1>
Supplier NCR Performance Dashboard
</h1>

<p>
Google Sheet → Vercel API → JSON → Dashboard
</p>

</header>

<section class="kpis">

<div class="kpi">
<h3>Total NCR</h3>
<span id="totalNcr">0</span>
</div>

<div class="kpi">
<h3>Total Qty</h3>
<span id="totalQty">0</span>
</div>

<div class="kpi">
<h3>Suppliers</h3>
<span id="totalSupplier">0</span>
</div>

<div class="kpi">
<h3>Parts</h3>
<span id="totalPart">0</span>
</div>

</section>

<section class="charts">

<canvas id="supplierChart"></canvas>

<canvas id="yearChart"></canvas>

</section>

<table id="detailTable">

<thead>
<tr>
<th>Supplier</th>
<th>Part</th>
<th>Phenomenon</th>
<th>Qty</th>
</tr>
</thead>

<tbody></tbody>

</table>

</body>
</html>
