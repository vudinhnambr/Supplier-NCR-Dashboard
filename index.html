<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supplier NCR Dashboard</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="app.js"></script>

</head>

<body>

<div class="header">

    <div class="left-panel">

        <div class="filter-title">
            NCR Analysis
        </div>

        <select id="supplierFilter">
            <option value="ALL">All Suppliers</option>
        </select>

        <select id="yearFilter">
            <option value="ALL">All Years</option>
        </select>

    </div>

    <div class="dashboard-title">
        SUPPLIER PERFORMANCE
    </div>

</div>

<div class="kpis">

    <div class="kpi">
        <h3>Total NCR</h3>
        <span id="totalNcr">0</span>
    </div>

    <div class="kpi">
        <h3>Total Qty</h3>
        <span id="totalQty">0</span>
    </div>

    <div class="kpi">
        <h3>Suppliers</h3>
        <span id="totalSupplier">0</span>
    </div>

    <div class="kpi">
        <h3>Parts</h3>
        <span id="totalPart">0</span>
    </div>

    <div class="kpi">
        <h3>Open NCR</h3>
        <span id="openNcr">0</span>
    </div>

</div>

<div class="charts-grid">

    <div class="chart-card">
        <canvas id="supplierChart"></canvas>
    </div>

    <div class="chart-card">
        <canvas id="yearChart"></canvas>
    </div>

    <div class="chart-card">
        <canvas id="monthChart"></canvas>
    </div>

    <div class="chart-card">
        <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-card">
        <canvas id="partChart"></canvas>
    </div>

    <div class="chart-card">
        <canvas id="phenomenonChart"></canvas>
    </div>

    <div class="chart-card trend-full">
        <canvas id="trendChart"></canvas>
    </div>

</div>

<div class="table-card">

<table id="detailTable">

<thead>

<tr>
<th>Supplier</th>
<th>Part</th>
<th>Phenomenon</th>
<th>Qty</th>
<th>Year</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</body>
</html>
