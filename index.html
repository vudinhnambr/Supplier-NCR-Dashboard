<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Supplier NCR Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">

<div class="left-panel">

<h2>NCR Analysis</h2>

<select id="supplierFilter">
<option value="">All Suppliers</option>
</select>

<select id="yearFilter">
<option value="">All Years</option>
</select>

</div>

<div class="title">
SUPPLIER PERFORMANCE
</div>

</div>

<div class="kpi-grid">

<div class="kpi-card">
<h4>Total NCR</h4>
<span id="totalNcr">0</span>
</div>

<div class="kpi-card">
<h4>Total Qty</h4>
<span id="totalQty">0</span>
</div>

<div class="kpi-card">
<h4>Suppliers</h4>
<span id="totalSupplier">0</span>
</div>

<div class="kpi-card">
<h4>Parts</h4>
<span id="totalPart">0</span>
</div>

<div class="kpi-card">
<h4>Open NCR</h4>
<span id="openNcr">0</span>
</div>

</div>

<div class="charts-grid">

<div class="chart-card wide">
<h3>Supplier NCR Ranking</h3>
<canvas id="supplierChart"></canvas>
</div>

<div class="chart-card">
<h3>NCR by Year</h3>
<canvas id="yearChart"></canvas>
</div>

<div class="chart-card">
<h3>NCR by Month</h3>
<canvas id="monthChart"></canvas>
</div>

<div class="chart-card">
<h3>Top Parts</h3>
<canvas id="partChart"></canvas>
</div>

<div class="chart-card">
<h3>Phenomenon</h3>
<canvas id="phenomenonChart"></canvas>
</div>

<div class="chart-card wide">
<h3>Replacement Status</h3>
<canvas id="statusChart"></canvas>
</div>

</div>

<script src="app.js"></script>

</body>

</html>
